<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="top-nav">
            <a href="/" class="brand-mark" aria-label="Roman's Summer Bridge Program Home">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Roman's Summer Bridge Program logo" class="brand-logo">
            </a>
            <a href="/" class="nav-link">Home</a>
            <a href="/login" class="nav-link">Login</a>
            <a href="/signup" class="nav-link active">Sign Up</a>
        </div>

        <h1>Sign Up</h1>
        {% if error %}
            <p class="error-message">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <label>First and Last Name:</label>
            <input type="text" name="username" placeholder="First Last" value="{{ signup_username }}" required>
            <br><br>
            <label>Password:</label>
            <input type="password" name="password" required>
            <br><br>
            <button type="submit">Create Account</button>
        </form>
    </div>
</body>
</html>
