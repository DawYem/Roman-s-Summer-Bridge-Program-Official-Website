<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="top-nav">
            <a href="/" class="brand-mark" aria-label="Roman's Summer Bridge Program Home">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Roman's Summer Bridge Program logo" class="brand-logo">
            </a>
            <a href="/" class="nav-link">Home</a>
            <a href="/login" class="nav-link">Login</a>
            <a href="/signup" class="nav-link active">Sign Up</a>
        </div>

        <section class="auth-panel auth-panel-signup">
            <div class="auth-copy">
                <p class="auth-kicker">Volunteer registration</p>
                <h1>Sign Up</h1>
                <p class="auth-description">Create your volunteer account so you can log hours, track participation, and access the dashboard.</p>
            </div>

            {% if error %}
                <p class="error-message">{{ error }}</p>
            {% endif %}

            <form method="POST" class="auth-form">
                <div class="form-field">
                    <label for="username">First and Last Name</label>
                    <input id="username" type="text" name="username" placeholder="First Last" value="{{ signup_username }}" required>
                </div>

                <div class="form-field form-field-inline">
                    <div>
                        <label for="age">Age</label>
                        <input id="age" type="number" name="age" min="1" value="{{ signup_age }}" required>
                    </div>

                    <div>
                        <label for="grade_level">Grade Level</label>
                        <select id="grade_level" name="grade_level" required>
                            <option value="" disabled {% if not signup_grade_level %}selected{% endif %}>Select grade level</option>
                            <optgroup label="School Grades">
                            <option value="1st Grade" {% if signup_grade_level == '1st Grade' %}selected{% endif %}>1st Grade</option>
                            <option value="2nd Grade" {% if signup_grade_level == '2nd Grade' %}selected{% endif %}>2nd Grade</option>
                            <option value="3rd Grade" {% if signup_grade_level == '3rd Grade' %}selected{% endif %}>3rd Grade</option>
                            <option value="4th Grade" {% if signup_grade_level == '4th Grade' %}selected{% endif %}>4th Grade</option>
                            <option value="5th Grade" {% if signup_grade_level == '5th Grade' %}selected{% endif %}>5th Grade</option>
                            <option value="6th Grade" {% if signup_grade_level == '6th Grade' %}selected{% endif %}>6th Grade</option>
                            <option value="7th Grade" {% if signup_grade_level == '7th Grade' %}selected{% endif %}>7th Grade</option>
                            <option value="8th Grade" {% if signup_grade_level == '8th Grade' %}selected{% endif %}>8th Grade</option>
                            <option value="9th Grade" {% if signup_grade_level == '9th Grade' %}selected{% endif %}>9th Grade</option>
                            <option value="10th Grade" {% if signup_grade_level == '10th Grade' %}selected{% endif %}>10th Grade</option>
                            <option value="11th Grade" {% if signup_grade_level == '11th Grade' %}selected{% endif %}>11th Grade</option>
                            <option value="12th Grade" {% if signup_grade_level == '12th Grade' %}selected{% endif %}>12th Grade</option>
                            </optgroup>
                            <optgroup label="College">
                            <option value="College Freshman" {% if signup_grade_level == 'College Freshman' %}selected{% endif %}>College Freshman</option>
                            <option value="College Sophomore" {% if signup_grade_level == 'College Sophomore' %}selected{% endif %}>College Sophomore</option>
                            <option value="College Junior" {% if signup_grade_level == 'College Junior' %}selected{% endif %}>College Junior</option>
                            <option value="College Senior" {% if signup_grade_level == 'College Senior' %}selected{% endif %}>College Senior</option>
                            </optgroup>
                            <option value="Post-Grad" {% if signup_grade_level == 'Post-Grad' %}selected{% endif %}>Post-Grad</option>
                        </select>
                    </div>
                </div>

                <div class="form-field">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" required>
                </div>

                <button type="submit" class="auth-submit">Create Account</button>
            </form>

            <p class="auth-footer">
                Already have an account? <a href="/login">Log in here</a>.
            </p>
        </section>
    </div>
</body>
</html>
