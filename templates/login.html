<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <div class="top-nav">
        <a href="/" class="brand-mark" aria-label="Roman's Summer Bridge Program Home">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Roman's Summer Bridge Program logo" class="brand-logo">
        </a>
        <a href="/" class="nav-link">Home</a>
        <a href="/login" class="nav-link active">Login</a>
        <a href="/signup" class="nav-link">Sign Up</a>
    </div>

    <h1>Login</h1>
    {% if error %}
        <p class="error-message">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="First Last" value="{{ login_username }}" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
