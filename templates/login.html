<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <div class="top-nav">
        <a href="/" class="brand-mark" aria-label="Roman's Summer Bridge Program Home">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Roman's Summer Bridge Program logo" class="brand-logo">
        </a>
        <a href="/" class="nav-link">Home</a>
        <a href="/login" class="nav-link active">Login</a>
        <a href="/signup" class="nav-link">Sign Up</a>
    </div>

    <section class="auth-panel auth-panel-login">
        <div class="auth-copy">
            <p class="auth-kicker">Welcome back</p>
            <h1>Login</h1>
            <p class="auth-description">Sign in to log volunteer hours, view your entries, and access admin tools if your account has permission.</p>
        </div>

        {% if error %}
            <p class="error-message">{{ error }}</p>
        {% endif %}

        <form method="POST" class="auth-form">
            <div class="form-field">
                <label for="login-username">First and Last Name</label>
                <input id="login-username" type="text" name="username" placeholder="First Last" value="{{ login_username }}" required>
            </div>

            <div class="form-field">
                <label for="login-password">Password</label>
                <input id="login-password" type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit" class="auth-submit">Login</button>
        </form>

        <p class="auth-footer">
            New to the program? <a href="/signup">Create an account</a>.
        </p>
    </section>
</div>

</body>
</html>
